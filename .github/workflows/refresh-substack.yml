# Refresh the home page's "Latest writing" list from the Substack RSS feed.
#
# Runs every 6 hours (and on demand). Regenerates posts.json; commits only if
# it actually changed, so there's no churn between new posts. GitHub Pages then
# redeploys automatically on the commit.
name: Refresh Substack posts

on:
  schedule:
    - cron: "17 */6 * * *"   # every 6 hours, offset off the hour
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Fetch latest posts
        run: python3 scripts/fetch_substack.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- posts.json; then
            echo "No change to posts.json."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts.json
          git commit -m "chore: refresh Substack posts"
          git push
