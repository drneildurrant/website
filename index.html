<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neil Durrant — Coming Soon</title>
    <meta name="description" content="Neil Durrant — Writer, Philosopher, Unreformed Heretic. New site coming soon.">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: #e8e4df;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            overflow: hidden;
        }

        .grain {
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .glow {
            position: fixed;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(180,140,100,0.06) 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: clamp(2.5rem, 6vw, 4rem);
            letter-spacing: 0.02em;
            margin-bottom: 0.5rem;
            color: #f5f0eb;
        }

        .tagline {
            font-size: 0.85rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #8a7e72;
            margin-bottom: 2.5rem;
        }

        .divider {
            width: 40px;
            height: 1px;
            background: #8a7e72;
            margin: 0 auto 2.5rem;
        }

        .coming {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.4rem;
            color: #c4b8a8;
            margin-bottom: 1rem;
        }

        .subtext {
            font-size: 0.9rem;
            color: #6b6159;
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }

        .quote {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.1rem;
            color: #7a6f63;
            margin-bottom: 3rem;
            padding: 0 1rem;
        }

        .links {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .links a {
            color: #a89880;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding-bottom: 2px;
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .links a:hover {
            color: #f5f0eb;
            border-bottom-color: #8a7e72;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container > * {
            animation: fadeIn 1s ease forwards;
            opacity: 0;
        }

        .container > *:nth-child(1) { animation-delay: 0.2s; }
        .container > *:nth-child(2) { animation-delay: 0.4s; }
        .container > *:nth-child(3) { animation-delay: 0.6s; }
        .container > *:nth-child(4) { animation-delay: 0.8s; }
        .container > *:nth-child(5) { animation-delay: 1.0s; }
        .container > *:nth-child(6) { animation-delay: 1.2s; }
        .container > *:nth-child(7) { animation-delay: 1.4s; }
    </style>
</head>
<body>
    <div class="grain"></div>
    <div class="glow"></div>
    <div class="container">
        <h1>Neil Durrant</h1>
        <div class="tagline">Writer · Philosopher · Unreformed Heretic</div>
        <div class="divider"></div>
        <div class="coming">Something is taking shape.</div>
        <div class="subtext">
            A new home for writing on consciousness, pleasure, meaning,<br>
            and the radical idea that nothing about you needs fixing.
        </div>
        <div class="quote">"Most of what passes for wisdom is just fear wearing a toga."</div>
        <div class="links">
            <a href="https://neildurrant.substack.com">Substack</a>
            <a href="https://www.facebook.com/profile.php?id=61575289498498">Facebook</a>
            <a href="mailto:neil@neildurrant.com">Contact</a>
        </div>
    </div>
</body>
</html>
